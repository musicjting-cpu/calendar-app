<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月曆系統</title>
<style>
body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif; background: #eef1f5; }
.loading { text-align: center; margin-top: 40vh; color: #94a3b8; font-size: 16px; }
</style>
</head>
<body>
<div class="loading">載入中...</div>
<script>
(function() {
  var token = localStorage.getItem('calendar_token');
  if (token) {
    fetch('/api/verify', { headers: { 'Authorization': 'Bearer ' + token } })
      .then(function(r) { if (r.ok) { window.location.replace('calendar.html'); } else { localStorage.removeItem('calendar_token'); window.location.replace('login.html'); } })
      .catch(function() { window.location.replace('login.html'); });
  } else {
    window.location.replace('login.html');
  }
})();
</script>
</body>
</html>
