<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登入 - 媽咪新生入園月曆</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
</head>
<body class="login-page">
<div class="login-container">
  <div class="login-card">
    <div class="login-icon">📅</div>
    <h1>媽咪新生入園月曆</h1>
    <p class="login-subtitle">115年6月 ~ 116年2月</p>
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="請輸入 Email" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">密碼</label>
        <input type="password" id="password" placeholder="請輸入密碼 (至少 6 碼)" required autocomplete="current-password">
      </div>
      <div id="loginError" class="login-error"></div>
      <button type="submit" class="btn btn-primary btn-full">登入</button>
    </form>
    <p style="margin-top:16px;font-size:13px;color:#94a3b8;">
      帳號由管理者建立
    </p>
  </div>
</div>
<script>
(function() {
  var loginAttempts = 0;
  var lockoutTime = 0;

  firebase.auth().onAuthStateChanged(function(user) {
    if (user) window.location.replace('calendar.html');
  });

  var loginForm = document.getElementById('loginForm');
  var emailInput = document.getElementById('email');
  var passwordInput = document.getElementById('password');
  var errorEl = document.getElementById('loginError');

  function setLoading(loading) {
    var btn = loginForm.querySelector('button[type="submit"]');
    btn.disabled = loading;
    btn.textContent = loading ? '處理中...' : '登入';
  }

  loginForm.addEventListener('submit', function(e) {
    e.preventDefault();
    errorEl.textContent = '';

    var now = Date.now();
    if (now < lockoutTime) {
      var sec = Math.ceil((lockoutTime - now) / 1000);
      errorEl.textContent = '登入嘗試過多，請 ' + sec + ' 秒後再試';
      return;
    }

    setLoading(true);
    firebase.auth().signInWithEmailAndPassword(emailInput.value, passwordInput.value)
      .then(function() { window.location.href = 'calendar.html'; })
      .catch(function(err) {
        loginAttempts++;
        if (loginAttempts >= 5) {
          lockoutTime = Date.now() + 60000;
          loginAttempts = 0;
          errorEl.textContent = '登入嘗試過多，請 60 秒後再試';
        } else if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
          errorEl.textContent = '帳號或密碼錯誤（剩餘 ' + (5 - loginAttempts) + ' 次機會）';
        } else {
          errorEl.textContent = err.message;
        }
        setLoading(false);
      });
  });
})();
</script>
</body>
</html>
