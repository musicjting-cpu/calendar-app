<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登入 - 月曆系統</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
</head>
<body class="login-page">
<div class="login-container">
  <div class="login-card">
    <div class="login-icon">📅</div>
    <h1>月曆系統</h1>
    <p class="login-subtitle">115年8月 ~ 116年2月</p>
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="請輸入 Email" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">密碼</label>
        <input type="password" id="password" placeholder="請輸入密碼" required autocomplete="current-password">
      </div>
      <div id="loginError" class="login-error"></div>
      <button type="submit" class="btn btn-primary btn-full">登入</button>
    </form>
    <p style="margin-top:16px;font-size:13px;color:#94a3b8;">
      還沒有帳號？<a href="#" id="goRegister" style="color:#667eea;text-decoration:none;">註冊</a>
    </p>
  </div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  var email = document.getElementById('email').value;
  var password = document.getElementById('password').value;
  var errorEl = document.getElementById('loginError');
  errorEl.textContent = '';
  firebase.auth().signInWithEmailAndPassword(email, password)
    .then(function() { window.location.href = 'calendar.html'; })
    .catch(function(err) {
      if (err.code === 'auth/user-not-found') errorEl.textContent = '帳號不存在';
      else if (err.code === 'auth/wrong-password') errorEl.textContent = '密碼錯誤';
      else if (err.code === 'auth/invalid-credential') errorEl.textContent = '帳號或密碼錯誤';
      else errorEl.textContent = err.message;
    });
});

document.getElementById('goRegister').addEventListener('click', function(e) {
  e.preventDefault();
  var email = document.getElementById('email').value;
  var password = document.getElementById('password').value;
  var errorEl = document.getElementById('loginError');
  if (!email || !password) { errorEl.textContent = '請先填寫 Email 和密碼'; return; }
  if (password.length < 6) { errorEl.textContent = '密碼至少 6 碼'; return; }
  firebase.auth().createUserWithEmailAndPassword(email, password)
    .then(function() {
      errorEl.textContent = '';
      alert('註冊成功！');
      window.location.href = 'calendar.html';
    })
    .catch(function(err) {
      if (err.code === 'auth/email-already-in-use') errorEl.textContent = '此 Email 已註冊';
      else errorEl.textContent = err.message;
    });
});
</script>
</body>
</html>
