<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登入 - 月曆系統</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
<div class="login-container">
  <div class="login-card">
    <div class="login-icon">📅</div>
    <h1>月曆系統</h1>
    <p class="login-subtitle">115年8月 ~ 116年2月</p>

    <div id="setupArea" class="hidden">
      <p style="color:#64748b;margin-bottom:16px;">首次使用，請設定登入密碼：</p>
      <form id="setupForm">
        <div class="form-group">
          <label for="setupPassword">設定密碼</label>
          <input type="password" id="setupPassword" placeholder="請輸入密碼 (至少 4 碼)" required autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="setupPassword2">確認密碼</label>
          <input type="password" id="setupPassword2" placeholder="再次輸入密碼" required autocomplete="new-password">
        </div>
        <div id="setupError" class="login-error"></div>
        <button type="submit" class="btn btn-primary btn-full">設定並登入</button>
      </form>
    </div>

    <div id="loginArea">
      <form id="loginForm">
        <div class="form-group">
          <label for="password">密碼</label>
          <input type="password" id="password" placeholder="請輸入密碼" required autocomplete="current-password">
        </div>
        <div id="loginError" class="login-error"></div>
        <button type="submit" class="btn btn-primary btn-full">登入</button>
      </form>
    </div>
  </div>
</div>
<script>
(function() {
  var STORAGE_KEY = 'calendar_app_settings';
  var settings = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

  function hash(str) {
    var h = 0;
    for (var i = 0; i < str.length; i++) {
      h = ((h << 5) - h) + str.charCodeAt(i);
      h |= 0;
    }
    return 'h' + Math.abs(h).toString(36);
  }

  function show(id) { document.getElementById(id).classList.remove('hidden'); }
  function hide(id) { document.getElementById(id).classList.add('hidden'); }

  if (!settings.passwordHash) {
    hide('loginArea');
    show('setupArea');
  }

  document.getElementById('setupForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var p1 = document.getElementById('setupPassword').value;
    var p2 = document.getElementById('setupPassword2').value;
    var err = document.getElementById('setupError');
    if (p1.length < 4) { err.textContent = '密碼至少 4 碼'; return; }
    if (p1 !== p2) { err.textContent = '兩次密碼不符'; return; }
    settings.passwordHash = hash(p1);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
    sessionStorage.setItem('calendar_logged_in', '1');
    window.location.href = 'calendar.html';
  });

  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var pwd = document.getElementById('password').value;
    var err = document.getElementById('loginError');
    if (hash(pwd) === settings.passwordHash) {
      sessionStorage.setItem('calendar_logged_in', '1');
      window.location.href = 'calendar.html';
    } else {
      err.textContent = '密碼錯誤';
    }
  });
})();
</script>
<style>
.hidden { display: none !important; }
</style>
</body>
</html>
