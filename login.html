<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登入 - 月曆系統</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
<div class="login-container">
  <div class="login-card">
    <div class="login-icon">📅</div>
    <h1>月曆系統</h1>
    <p class="login-subtitle">115年8月 ~ 116年2月</p>
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="請輸入 Email" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">密碼</label>
        <input type="password" id="password" placeholder="請輸入密碼 (至少 6 碼)" required autocomplete="current-password">
      </div>
      <div id="loginError" class="login-error"></div>
      <button type="submit" class="btn btn-primary btn-full">登入</button>
    </form>
    <p style="margin-top:16px;font-size:13px;color:#94a3b8;">
      還沒有帳號？<a href="#" id="goRegister" style="color:#667eea;text-decoration:none;">註冊</a>
    </p>
  </div>
</div>
<script>
(function() {
  var API = window.location.origin;
  var loginForm = document.getElementById('loginForm');
  var emailInput = document.getElementById('email');
  var passwordInput = document.getElementById('password');
  var errorEl = document.getElementById('loginError');
  var goRegister = document.getElementById('goRegister');

  function setLoading(loading) {
    var btn = loginForm.querySelector('button[type="submit"]');
    btn.disabled = loading;
    btn.textContent = loading ? '處理中...' : '登入';
  }

  loginForm.addEventListener('submit', function(e) {
    e.preventDefault();
    errorEl.textContent = '';
    setLoading(true);
    fetch(API + '/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: emailInput.value, password: passwordInput.value })
    })
    .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
    .then(function(res) {
      if (res.ok) {
        localStorage.setItem('calendar_token', res.data.token);
        window.location.href = 'calendar.html';
      } else {
        errorEl.textContent = res.data.error || '登入失敗';
        setLoading(false);
      }
    })
    .catch(function() { errorEl.textContent = '無法連線到伺服器'; setLoading(false); });
  });

  goRegister.addEventListener('click', function(e) {
    e.preventDefault();
    var email = emailInput.value.trim();
    var password = passwordInput.value;
    if (!email || !password) { errorEl.textContent = '請先填寫 Email 和密碼'; return; }
    if (password.length < 6) { errorEl.textContent = '密碼至少 6 碼'; return; }
    setLoading(true);
    fetch(API + '/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, password: password })
    })
    .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
    .then(function(res) {
      if (res.ok) {
        localStorage.setItem('calendar_token', res.data.token);
        window.location.href = 'calendar.html';
      } else {
        errorEl.textContent = res.data.error || '註冊失敗';
        setLoading(false);
      }
    })
    .catch(function() { errorEl.textContent = '無法連線到伺服器'; setLoading(false); });
  });
})();
</script>
</body>
</html>
