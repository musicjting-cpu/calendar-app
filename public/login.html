<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登入 - 月曆系統</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
<div class="login-container">
  <div class="login-card">
    <div class="login-icon">📅</div>
    <h1>月曆系統</h1>
    <p class="login-subtitle">115年8月 ~ 115年12月</p>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">帳號</label>
        <input type="text" id="username" name="username" placeholder="請輸入帳號" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">密碼</label>
        <input type="password" id="password" name="password" placeholder="請輸入密碼" required autocomplete="current-password">
      </div>
      <div id="loginError" class="login-error"></div>
      <button type="submit" class="btn btn-primary btn-full">登入</button>
    </form>
  </div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errorEl = document.getElementById('loginError');
  errorEl.textContent = '';
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    if (res.ok) {
      window.location.href = '/calendar.html';
    } else {
      const data = await res.json();
      errorEl.textContent = data.error || '登入失敗';
    }
  } catch (err) {
    errorEl.textContent = '無法連線到伺服器';
  }
});
</script>
</body>
</html>
