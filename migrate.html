<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>資料匯入 - 月曆系統</title>
<link rel="stylesheet" href="css/style.css">
<style>
.migrate-container { max-width: 600px; margin: 40px auto; padding: 20px; }
.migrate-card { background: white; border-radius: 16px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
.migrate-card h2 { margin-bottom: 16px; }
.migrate-card pre { background: #f8fafc; padding: 12px; border-radius: 8px; font-size: 13px; overflow-x: auto; }
.log-area { background: #1e293b; color: #a5f3fc; padding: 16px; border-radius: 8px; font-family: monospace; font-size: 13px; max-height: 300px; overflow-y: auto; margin: 16px 0; white-space: pre-wrap; }
.status-bar { padding: 12px 16px; border-radius: 8px; margin: 12px 0; font-weight: 600; }
.status-ok { background: #d1fae5; color: #065f46; }
.status-err { background: #fce4ec; color: #b71c1c; }
.hidden { display: none; }
</style>
</head>
<body>
<div class="migrate-container">
  <div class="migrate-card">
    <h2>📥 資料匯入工具</h2>
    <p style="color:#64748b;margin-bottom:16px;">將舊資料匯入 localStorage</p>

    <div style="margin-bottom:16px;">
      <p style="font-weight:600;margin-bottom:8px;">即將匯入以下資料：</p>
      <pre id="dataPreview">載入中...</pre>
    </div>

    <div id="statusArea" class="log-area">尚未開始</div>

    <div id="progressBar" style="height:4px;background:#e2e8f0;border-radius:2px;margin:12px 0;overflow:hidden;">
      <div id="progressFill" style="height:100%;width:0%;background:#667eea;border-radius:2px;transition:width 0.3s;"></div>
    </div>

    <div id="actions">
      <button id="startBtn" class="btn btn-primary btn-full" style="padding:12px!important;font-size:16px!important;">開始匯入</button>
    </div>

    <div id="resultArea" class="hidden"></div>

    <p style="margin-top:16px;text-align:center;">
      <a href="calendar.html" style="color:#667eea;text-decoration:none;">← 回到月曆</a>
    </p>
  </div>
</div>

<script>
var STORAGE_KEY = 'calendar_app_events';
var oldData = {
  "2026-08-03": [
    { "id": "mqcztrod5927f457", "text": "Apple, Amber" },
    { "id": "mqczuhxhfaeadae2", "text": "BA_22" },
    { "id": "mqczv17v573170c2", "text": "BA_6" }
  ]
};

document.getElementById('dataPreview').textContent = JSON.stringify(oldData, null, 2);

function log(msg) {
  var area = document.getElementById('statusArea');
  area.textContent += msg + '\n';
  area.scrollTop = area.scrollHeight;
}

function setProgress(pct) {
  document.getElementById('progressFill').style.width = pct + '%';
}

function showResult(type, msg) {
  var area = document.getElementById('resultArea');
  area.className = 'status-bar status-' + type;
  area.textContent = msg;
  area.classList.remove('hidden');
}

function loadEvents() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch { return {}; }
}

function saveEvents(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

document.getElementById('startBtn').addEventListener('click', function() {
  var btn = document.getElementById('startBtn');
  btn.disabled = true;
  btn.textContent = '匯入中...';
  document.getElementById('resultArea').classList.add('hidden');

  var existing = loadEvents();
  var dates = Object.keys(oldData);
  var total = 0;
  for (var d in oldData) total += oldData[d].length;
  var done = 0;
  var imported = 0, skipped = 0;

  log('📦 開始匯入 ' + total + ' 筆資料...');

  for (var i = 0; i < dates.length; i++) {
    var date = dates[i];
    var items = oldData[date];
    log('📅 ' + date + ' (' + items.length + ' 筆)');

    for (var j = 0; j < items.length; j++) {
      var item = items[j];
      if (existing[date]) {
        existing[date].push({ id: item.id || generateId(), text: item.text });
      } else {
        existing[date] = [{ id: item.id || generateId(), text: item.text }];
      }
      imported++;
      log('  ✅ ' + item.text);
      done++;
      setProgress(Math.round((done / total) * 100));
    }
  }

  saveEvents(existing);
  log('');
  log('══════════════════════════');
  log('✅ 匯入完成：' + imported + ' 筆');
  log('══════════════════════════');

  btn.textContent = '✓ 匯入完成';
  showResult('ok', '匯入完成：共 ' + imported + ' 筆資料');
});
</script>
</body>
</html>
